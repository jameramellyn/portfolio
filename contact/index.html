<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <style>
    html {
      --color-accent: rgba(186, 206, 215, 1);
      --color-nav-bg: #f7f7f5;
      --color-border: #e5e5e0;
      --color-text: #37352f;
      --color-hover-text: #1f2937;
      accent-color: var(--color-accent);
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      max-width: 100ch;
      margin: 0 auto;
      padding: 0;
      color: var(--color-text);
      background: white;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: var(--color-nav-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0.5rem 1rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 0;
      padding: 0;
    }

    nav li {
      display: block;
    }

    nav a {
      display: inline-block;
      text-decoration: none;
      color: var(--color-text);
      padding: 0.55rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s ease, color 0.2s ease;
      font-size: 0.95rem;
    }

    nav a:hover {
      background-color: var(--color-accent);
      color: var(--color-hover-text);
    }

    nav a.current {
      background-color: #ececeb;
      font-weight: 600;
    }

    nav a.current:hover {
      background-color: var(--color-accent);
    }

    .content {
      padding: 2rem 1rem;
    }

    h1 {
      margin-top: 0;
    }

    img {
      max-width: 300px;
      width: 100%;
      height: auto;
      margin-top: 1rem;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Contact</h1>

  <nav>
    <ul>
      <li><a href="../">Home</a></li>
      <li><a href="https://github.com/jameramellyn" target="_blank">Github</a></li>
      <li><a href="../contact/" class="current">Contact</a></li>
      <li><a href="../projects/">Projects</a></li>
      <li><a href="../resume/">Resume</a></li>
    </ul>
  </nav>

  <form action="mailto:jameramellyn@gmail.com" method="post" enctype="text/plain">
    <label>
      <span>Email:</span>
      <input id="email" name="email" type="email" value="test@example.com">
    </label>

    <label>
      <span>Subject:</span>
      <input id="subject" name="subject" value="Test Subject">
    </label>

    <label>
      <span>Message:</span>
      <textarea id="body" name="body">This is a test message.</textarea>
    </label>

    <button>Submit</button>
  </form>
</body>
</html>
