<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Jamera Fernando</title>

  <script type="module" src="/global.js"></script>
  <style>
    html {
      --color-accent: rgba(186, 206, 215, 1);
      accent-color: var(--color-accent);
      scroll-behavior: smooth;
      color-scheme: light dark;
    }

    .color-scheme {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 80%;
      z-index: 1001;
    }

    select {
      font: inherit;
      padding: 0.3rem 0.4rem;
    }
  
    * {
      box-sizing: border-box;
    }
  
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      background: Canvas;
      color: CanvasText;
    }
  
    nav {
      --border-color: oklch(50% 10% 200 / 40%);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
    }
  
    nav a {
      display: inline-block;
      text-decoration: none;
      color: inherit;
      padding: 0.55rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s ease;
      font-size: 0.95rem;
    }
  
    nav a:hover {
      background-color: color-mix(in oklch, var(--color-accent), canvas 85%);
    }
  
    nav a.current {
      background-color: color-mix(in oklch, var(--color-accent), canvas 80%);
      font-weight: 600;
    }
  
    .page-header {
      padding: 5rem 1.5rem 2rem;
      text-align: center;
    }
  
    .page-header h1 {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 4.3rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }
  
    .page-header p {
      margin: 1rem auto 0;
      max-width: 680px;
      font-size: 1.05rem;
      color: color-mix(in oklch, CanvasText, Canvas 35%);
    }
  
    .resume-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }
  
    section {
      margin-bottom: 2.5rem;
      background: Canvas;
      border: 1px solid color-mix(in oklch, CanvasText, Canvas 75%);
      border-radius: 18px;
      padding: 1.5rem;
    }
  
    section h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
    }
  
    form {
      display: grid;
      gap: 1.2rem;
      margin-top: 1rem;
    }
  
    label span {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      font-size: 0.95rem;
    }
  
    input,
    textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid color-mix(in oklch, CanvasText, Canvas 70%);
      background: Canvas;
      color: CanvasText;
      font: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
  
    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px color-mix(in oklch, var(--color-accent), canvas 85%);
    }
  
    textarea {
      min-height: 150px;
      resize: vertical;
    }
  
    button {
      margin-top: 0.5rem;
      border: none;
      border-radius: 12px;
      padding: 0.9rem 1.2rem;
      font-weight: 600;
      background: var(--color-accent);
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease;
    }
  
    button:hover {
      transform: translateY(-1px);
    }
  
    .contact-note {
      margin-top: 1rem;
      font-size: 0.95rem;
      text-align: center;
      color: color-mix(in oklch, CanvasText, Canvas 35%);
    }
  
    @media (max-width: 768px) {
      .page-header {
        padding-top: 4rem;
      }
    }
  </style>

</head>
<body>
  <!-- <ul>
    <li><a href="../">Home</a></li>
    <li><a href="../#about">About</a></li>
    <li><a href="../projects/">Projects</a></li>
    <li><a href="../resume/">Resume</a></li>
    <li><a href="../contact/">Contact</a></li>
    <li><a href="https://github.com/jameramellyn" target="_blank">Github</a></li>
  </ul> -->

  <header class="page-header">
    <h1>Contact</h1>
    <p>Feel free to reach out for opportunities, collaborations, or just to connect.</p>
  </header>
  
  <main class="resume-wrapper">
    <section>
      <h2>Get in Touch</h2>
  
      <form action="mailto:jameramellyn@gmail.com">
        <label>
          <span>Subject</span>
          <input type="text" name="subject" placeholder="What would you like to talk about?">
        </label>
      
        <label>
          <span>Message</span>
          <textarea name="body" placeholder="Write your message here..."></textarea>
        </label>
      
        <button type="submit">Send Message</button>
      </form>
  
      <p class="contact-note">
        Or email me directly at
        <a href="mailto:jameramellyn@gmail.com">jameramellyn@gmail.com</a>.
      </p>
    </section>
  </main>
</body>
</html>
